<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    </head>
    <body>
        <textarea
            id="terminal_panel"
            tabindex="0"
            style="
                width: 80em;
                height: 10em;
                overflow: auto;
                border: 1px solid green;
                font-family: monospace;
                font-size: 14px;
            "
            value="This is the terminal panel. You can type commands here."
        ></textarea>
        <button id="put">write</button>
        <button id="putln">writeln</button>
        <script type="module">
            const history = [];
            const HISTORY_SIZE = 100;
            let historyIndex = 0;

            const terminal = document.getElementById("terminal_panel");
            terminal.focus();

            function printHistory() {
                history.toReversed().forEach((cmd, i) => {
                    const index = history.length - 1 - i;
                    console.log(`history[${index}]: ${historyIndex === index ? ">" : " "} ${cmd}`);
                });
                console.log(`historyIndex: ${historyIndex}`);
            }
            let position = 0;
            terminal.addEventListener("keydown", (event) => {
                if (event.key === "Backspace") {
                    if (history[historyIndex].length === 0) {
                        console.log("No characters to delete");
                        event.preventDefault();
                        return;
                    }
                    history[historyIndex] = history[historyIndex].slice(0, -1);
                    terminal.value = terminal.value.slice(0, -1);
                    event.preventDefault();
                }
                if (event.key === "Enter") {
                    try {
                        const cmd = terminal.value.split("\n").at(-1).trim();
                        if (cmd === "") return;
                        console.log("CMD", cmd);
                        if (history.length > 1 && cmd === history[1]) {
                            console.log("skipduplicate command", cmd, "history[1]", history[1]);
                            historyIndex = 0;
                            history[0] = "";
                            terminal.value += "\n";
                            return;
                        }
                        if (historyIndex > 0) history[0] = cmd;
                        history.unshift("");
                        if (history.length > HISTORY_SIZE) history.shift();
                        historyIndex = 0;
                        return;
                    } finally {
                        printHistory();
                        event.preventDefault();
                    }
                }
                function navigateHistory(direction) {
                    historyIndex += direction;
                    if (historyIndex >= history.length) historyIndex = 0;
                    if (historyIndex < 0) historyIndex = history.length - 1;
                    const v = terminal.value.split("\n");
                    v[v.length - 1] = history[historyIndex];
                    terminal.value = v.join("\n");
                    event.preventDefault();
                    printHistory();
                }
                if (event.key === "ArrowUp") navigateHistory(1);
                if (event.key === "ArrowDown") navigateHistory(-1);
                if (event.key.length === 1) {
                    history[historyIndex] += event.key;
                    console.log("character added:", event.key, "line buffer:", history[historyIndex]);
                }
                terminal.scrollTop = terminal.scrollHeight;
            });
            function put(str) {
                terminal.value += str;
                history[historyIndex] += str;
                terminal.scrollTop = terminal.scrollHeight;
            }
            function putln(str) {
                put(str + "\n");
                historyIndex = 0;
                history[historyIndex] = "";
            }
            history.unshift(...["", "ls -l", "cd /home/user", "echo 'Hello, World!'"]);
            printHistory();

            document.getElementById("put").addEventListener("click", () => {
                const now = new Date();
                put(`inline ${now.toLocaleTimeString()}`);
            });
            document.getElementById("putln").addEventListener("click", () => {
                const now = new Date();
                putln(`with new line ${now.toLocaleTimeString()}`);
            });
        </script>
    </body>
</html>
