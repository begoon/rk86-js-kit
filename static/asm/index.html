<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>asm8 playground</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="title">
        <h1>asm8</h1>
        <div class="build-time" id="build-time"></div>
      </div>
      <div class="toolbar">
        <label for="example">Example:</label>
        <select id="example">
          <option value="">— load example —</option>
        </select>
        <label for="filename">File:</label>
        <input
          type="text"
          id="filename"
          spellcheck="false"
          autocomplete="off"
        />
        <button
          type="button"
          id="run-bin"
          class="primary"
          title="run (Ctrl/Cmd+E)"
        >
          run <kbd>Ctrl+E</kbd>
        </button>
        <button type="button" id="upload-asm">upload</button>
        <button type="button" id="download-btn">download</button>
        <label for="download-format">as</label>
        <select id="download-format" title="download format">
          <option value="asm" selected>.asm</option>
          <option value="rk">.rk</option>
          <option value="rkr">.rkr</option>
          <option value="pki">.pki</option>
          <option value="gam">.gam</option>
          <option value="bin">.bin</option>
        </select>
        <button type="button" id="reset" class="danger">reset</button>
        <button type="button" id="theme" title="toggle theme">theme</button>
        <input
          type="file"
          id="file-input"
          accept=".asm,.s,.a,text/plain"
          hidden
        />
      </div>
    </header>
    <main>
      <div class="tabs" id="tabs"></div>
      <div class="editor">
        <div class="gutter" id="gutter" aria-hidden="true"></div>
        <div class="source-wrap">
          <div class="highlight" id="highlight" aria-hidden="true"></div>
          <textarea
            id="source"
            spellcheck="false"
            autocomplete="off"
            autocapitalize="off"
            autocorrect="off"
            wrap="off"
          ></textarea>
        </div>
      </div>
      <div id="error" class="error"></div>
    </main>
    <div id="modal" class="modal" hidden>
      <div
        class="modal-panel"
        role="dialog"
        aria-modal="true"
        aria-label="byte dump"
      >
        <pre id="modal-content"></pre>
      </div>
    </div>
    <div id="confirm-modal" class="modal" hidden>
      <div class="modal-panel confirm-panel" role="dialog" aria-modal="true">
        <p id="confirm-message"></p>
        <div class="modal-actions">
          <button type="button" id="confirm-cancel">Cancel</button>
          <button type="button" id="confirm-ok" class="primary">OK</button>
        </div>
      </div>
    </div>
    <script src="conf.js"></script>
    <script src="examples.js"></script>
    <script type="module" src="playground.js"></script>
  </body>
</html>
